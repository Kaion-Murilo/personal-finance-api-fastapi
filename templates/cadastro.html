{% extends "base.html" %} {% block titulo %}Cadastro{% endblock %} {% block
conteudo %}

<!-- ===================== REGISTER CARD ===================== -->
<div class="auth-container">
  <div class="card shadow auth-card">
    <div class="card-body">
      <h4 class="text-center mb-2">💰 Personal Finance</h4>
      <p class="text-center text-muted mb-4">Criar nova conta</p>

      <!-- Mensagem de erro -->
      {% if erro %}
      <div class="alert alert-danger">{{ erro }}</div>
      {% endif %}

      <!-- Formulário de cadastro -->
      <form method="post" action="/auth/cadastro">
        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input
            type="text"
            name="nome"
            class="form-control"
            required
            autofocus
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>

        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input
            type="password"
            name="password"
            class="form-control"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
      </form>

      <hr />

      <p class="text-center mb-0">
        Já tem conta?
        <a href="/auth/login">Fazer login</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
