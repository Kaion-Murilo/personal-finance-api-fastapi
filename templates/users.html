{% extends "base.html" %} {% block titulo %}Meu Perfil{% endblock %} {% block
conteudo %}

<div class="page-header">
  <h2>Meu Perfil</h2>
  <p>Gerencie suas informações pessoais</p>
</div>

<div class="row justify-content-center">
  <div class="col-md-6">
    <!-- Formulário de edição de perfil -->
    <div class="card mb-4">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4" style="font-size: 1rem">
          Informações da conta
        </h5>

        <form method="post" action="/user/editar">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input
              type="text"
              name="nome"
              class="form-control"
              value="{{ current_user.nome }}"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              value="{{ current_user.email }}"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">
              Nova Senha
              <span
                style="color: #9ca3af; font-weight: 400; text-transform: none"
              >
                (deixe em branco para não alterar)
              </span>
            </label>
            <input type="password" name="password_hash" class="form-control" />
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-floppy me-1"></i> Salvar Alterações
          </button>
        </form>
      </div>
    </div>

    <!-- Zona de perigo — separada visualmente do formulário principal -->
    <div class="card" style="border: 1px solid #fecaca">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1" style="font-size: 1rem; color: #dc2626">
          Zona de Perigo
        </h5>
        <p style="font-size: 0.875rem; color: #9ca3af; margin-bottom: 1.25rem">
          Ao excluir sua conta todos os seus dados serão removidos
          permanentemente.
        </p>
        <button
          type="button"
          class="btn btn-danger w-100"
          onclick="confirmarExclusao()"
        >
          <i class="bi bi-trash me-1"></i> Excluir Minha Conta
        </button>

        <!-- form oculto submetido via JS após confirmação -->
        <form
          id="delete-form"
          method="post"
          action="/user/deletar"
          style="display: none"
        ></form>
      </div>
    </div>
  </div>
</div>

<script>
  function confirmarExclusao() {
    if (
      confirm(
        "Deseja excluir sua conta permanentemente? Esta ação não pode ser desfeita.",
      )
    ) {
      document.getElementById("delete-form").submit();
    }
  }
</script>

{% endblock %}
