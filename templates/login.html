<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Personal Finance</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f5f6fa;
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        padding: 1rem;
      }

      .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }

      .brand-icon {
        width: 52px;
        height: 52px;
        background: #6366f1;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        margin: 0 auto 1rem;
      }

      .form-control {
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        padding: 0.6rem 0.875rem;
        font-size: 0.875rem;
      }

      .form-control:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }

      .form-label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.4rem;
      }

      .btn-primary {
        background: #6366f1;
        border-color: #6366f1;
        border-radius: 10px;
        font-weight: 600;
        padding: 0.65rem;
      }

      .btn-primary:hover {
        background: #4f46e5;
        border-color: #4f46e5;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        font-size: 0.8rem;
        margin: 1.25rem 0;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="card">
        <div class="card-body p-5">
          <!-- Logo e título -->
          <div class="text-center mb-4">
            <div class="brand-icon">💰</div>
            <h4 class="fw-bold mb-1" style="font-size: 1.25rem">
              Personal Finance
            </h4>
            <p style="color: #9ca3af; font-size: 0.875rem; margin: 0">
              Faça login para continuar
            </p>
          </div>

          <!-- Mensagem de erro vinda do backend -->
          {% if erro %}
          <div
            class="alert alert-danger d-flex align-items-center gap-2"
            style="font-size: 0.875rem; border-radius: 10px"
          >
            <i class="bi bi-exclamation-circle"></i>
            {{ erro }}
          </div>
          {% endif %}

          <form method="post" action="/auth/login">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                name="email"
                class="form-control"
                placeholder="seu@email.com"
                required
                autofocus
              />
            </div>
            <div class="mb-4">
              <label class="form-label">Senha</label>
              <input
                type="password"
                name="password"
                class="form-control"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Entrar <i class="bi bi-arrow-right ms-1"></i>
            </button>
          </form>

          <div class="divider">ou</div>

          <p
            class="text-center mb-0"
            style="font-size: 0.875rem; color: #6b7280"
          >
            Não tem conta?
            <a
              href="/auth/cadastro"
              style="color: #6366f1; font-weight: 600; text-decoration: none"
              >Criar conta</a
            >
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
