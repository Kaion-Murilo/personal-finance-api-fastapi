<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}Personal Finance{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- CSS do projeto -->
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}" />
  </head>

  <body>
    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
      <a href="/" class="sidebar-brand">
        <div class="brand-icon">💰</div>
        Personal Finance
      </a>

      <nav class="sidebar-nav">
        <div class="sidebar-section">Menu</div>
        <a href="/" class="sidebar-link">
          <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
        <a href="/transaction" class="sidebar-link">
          <i class="bi bi-arrow-left-right"></i> Transações
        </a>
        <a href="/category" class="sidebar-link">
          <i class="bi bi-tag"></i> Categorias
        </a>

        <div class="sidebar-section" style="margin-top: 1rem">Conta</div>
        <a href="/user" class="sidebar-link">
          <i class="bi bi-person"></i> Meu Perfil
        </a>
        <a href="/docs" class="sidebar-link" target="_blank">
          <i class="bi bi-code-square"></i> API Docs
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">{{ current_user.nome[0].upper() }}</div>
          <div>
            <p class="user-name">{{ current_user.nome }}</p>
            <p class="user-email">{{ current_user.email }}</p>
          </div>
        </div>
        <a href="/auth/logout" class="logout-btn">
          <i class="bi bi-box-arrow-right"></i> Sair
        </a>
      </div>
    </aside>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="main-content">{% block conteudo %}{% endblock %}</main>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const path = window.location.pathname;
      document.querySelectorAll(".sidebar-link").forEach((link) => {
        const href = link.getAttribute("href");
        if (href === "/" && path === "/") {
          link.classList.add("active");
        } else if (href !== "/" && path.startsWith(href)) {
          link.classList.add("active");
        }
      });
    </script>
  </body>
</html>
