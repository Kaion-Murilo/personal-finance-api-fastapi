<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}Personal Finance API{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">💰 Personal Finance</a>
        <div
          class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3"
        >
          <a class="nav-link text-white" href="/user"
            >👤 {{ current_user.nome }}</a
          >
          <a class="nav-link text-white" href="/category">Categorias</a>
          <a class="nav-link text-white" href="/transaction">Transações</a>
          <span class="text-white">| Olá, {{ current_user.nome }}</span>
          <a class="nav-link text-white" href="/auth/logout">🚪 Sair</a>
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block conteudo %}{% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
